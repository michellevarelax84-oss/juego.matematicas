<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aprende con Nosotros</title>

<link rel="stylesheet" href="css/estilo_juego1.css">

<!-- Librería de confeti visual -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

</head>
<body>

<div id="game">

    <h1>Aprende con Nosotros</h1>

    <!-- reloj -->
    <div id="loader">⏳</div>

    <!-- números -->
    <div id="numbers"></div>

    <!-- aquí aparecerán las manzanas abajo -->
    <div id="zonaManzanas"></div>

    <!-- mensaje -->
    <p id="message"></p>

    <!-- botón siguiente -->
    <button id="btnSiguiente"
        onclick="irSiguienteJuego()"
        style="display: none;">
        Siguiente
    </button>

</div>

<script src="js/script_juego.js"></script>

</body>
</html>
