<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Juguemos a Contar</title>

<!-- FAVICON -->

<link rel="icon"
href="img/logo1.png"
type="image/png">

<!-- CSS -->

<link rel="stylesheet"
href="css/estilo_juego2.css">

<!-- CONFETI -->

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

</head>

<body>

<div id="contenedor">

    <!-- TITULO -->

    <h1>
        Juguemos a Contar
    </h1>

    <!-- NIVEL -->

    <h2 id="nivel">
        ⭐ Nivel 1
    </h2>

    <!-- TEXTO -->

    <p>
        Arrastra los números
        hacia las manzanas 🍎
    </p>

    <!-- JUEGO -->

    <div id="juego">

        <!-- NUMEROS DESORDENADOS -->

        <div class="numeros">

            <div class="numero n1"
            draggable="true"
            id="3"
            ondragstart="arrastrar(event)">
                3
            </div>

            <div class="numero n2"
            draggable="true"
            id="1"
            ondragstart="arrastrar(event)">
                1
            </div>

            <div class="numero n3"
            draggable="true"
            id="5"
            ondragstart="arrastrar(event)">
                5
            </div>

            <div class="numero n4"
            draggable="true"
            id="2"
            ondragstart="arrastrar(event)">
                2
            </div>

            <div class="numero n5"
            draggable="true"
            id="4"
            ondragstart="arrastrar(event)">
                4
            </div>

        </div>

        <!-- ZONAS -->

        <div class="zonas">

            <div class="zona"
            data-numero="1"
            ondrop="soltar(event)"
            ondragover="permitir(event)">
                🍎
            </div>

            <div class="zona"
            data-numero="2"
            ondrop="soltar(event)"
            ondragover="permitir(event)">
                🍎🍎
            </div>

            <div class="zona"
            data-numero="3"
            ondrop="soltar(event)"
            ondragover="permitir(event)">
                🍎🍎🍎
            </div>

            <div class="zona"
            data-numero="4"
            ondrop="soltar(event)"
            ondragover="permitir(event)">
                🍎🍎🍎🍎
            </div>

            <div class="zona"
            data-numero="5"
            ondrop="soltar(event)"
            ondragover="permitir(event)">
                🍎🍎🍎🍎🍎
            </div>

        </div>

    </div>

    <!-- MENSAJE -->

    <div id="mensaje"></div>

    <!-- BOTONES -->

    <div class="botones">

        <button onclick="validar()">
            Validar respuestas
        </button>

        <button id="btnSiguiente"
        onclick="siguienteJuego()"
        style="display:none;">
            Siguiente juego
        </button>

    </div>

</div>

<!-- AUDIOS -->

<audio id="correcto"
src="sonidos/correcto.mp3"></audio>

<audio id="error"
src="sonidos/error.mp3"></audio>

<!-- JS -->

<script src="js/scrit_juego2.js"></script>

</body>
</html>
